services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cdc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdc}
      POSTGRES_DB: ${POSTGRES_DB:-cdc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cdc} -d ${POSTGRES_DB:-cdc}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgres://cdc:cdc@postgres:5432/cdc}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      API_PORT: ${API_PORT:-4000}
      UPLOAD_DIR: /app/uploads
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      INDEXING_WORKER_CONCURRENCY: ${INDEXING_WORKER_CONCURRENCY:-2}
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/migrations:/app/apps/api/migrations
      - ./apps/api/scripts:/app/apps/api/scripts
      - ./packages/contracts/src:/app/packages/contracts/src
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm --filter @cdc/contracts build && pnpm --filter @cdc/api dev"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgres://cdc:cdc@postgres:5432/cdc}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      UPLOAD_DIR: /app/uploads
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      INDEXING_WORKER_CONCURRENCY: ${INDEXING_WORKER_CONCURRENCY:-2}
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/migrations:/app/apps/api/migrations
      - ./apps/api/scripts:/app/apps/api/scripts
      - ./packages/contracts/src:/app/packages/contracts/src
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm --filter @cdc/contracts build && pnpm --filter @cdc/api worker:dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./packages/contracts/src:/app/packages/contracts/src
    depends_on:
      - api
    command: sh -c "pnpm --filter @cdc/contracts build && pnpm --filter @cdc/web dev --host 0.0.0.0"

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads:
